<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Pallet Scanner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

header{
background:#2c7a7b;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

#reader{
width:100%;
max-width:500px;
margin:auto;
margin-top:10px;
}

#results{
padding:15px;
display:none;
}

#summary{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

button{
background:#2c7a7b;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:5px;
margin-top:15px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
font-size:14px;
}

th{
background:#40916c;
color:white;
}

</style>

</head>

<body>

<header>
Pallet Scanner
</header>

<div id="reader"></div>

<div id="results">

<div id="summary"></div>

<table id="table"></table>

<center>
<button onclick="scanAgain()">Scan Another Pallet</button>
</center>

</div>

<script>

let scanner;

function parseQR(raw){

// Extract the pallet UUID from the QR
let palletID = raw.replace("PALLET:", "").trim();

// Request pallet data from the server
fetch("http://192.168.0.250/pallet.php?id=" + palletID)
.then(response => response.json())
.then(data => {

// Display pallet summary
document.getElementById("summary").innerText =
"Pallet ID: " + data.pallet_id +
" | Total Trays: " + data.total_trays;

// Build the table
let html = "<tr>" +
"<th>SKU</th>" +
"<th>Name</th>" +
"<th>Program</th>" +
"<th>Pkgs/Tray</th>" +
"<th>Trays</th>" +
"</tr>";

data.rows.forEach(function(row){

html += "<tr>" +
"<td>" + (row.SKU || "") + "</td>" +
"<td>" + (row.ProductName || "") + "</td>" +
"<td>" + (row.Program || "") + "</td>" +
"<td>" + (row.PackagesPerTray || 0) + "</td>" +
"<td>" + (row.TrayCount || 0) + "</td>" +
"</tr>";

});

// Insert table
document.getElementById("table").innerHTML = html;

// Switch screen from scanner → results
document.getElementById("reader").style.display = "none";
document.getElementById("results").style.display = "block";

})
.catch(err => {
console.log(err);
alert("Could not load pallet data");
});

}
function onScanSuccess(decodedText){

scanner.clear();

parseQR(decodedText);

}

function startScanner(){

scanner = new Html5QrcodeScanner(
"reader",
{
fps: 15,
qrbox: { width: 400, height: 400 },
aspectRatio: 1.0,
rememberLastUsedCamera: true
}
);

scanner.render(onScanSuccess);

}

function scanAgain(){

document.getElementById("results").style.display="none";
document.getElementById("reader").style.display="block";

startScanner();

}

startScanner();

</script>

</body>

</html>
